// ---------- layout engine ----------
const NW=190, HGAP=26, VGAP=86, SHGAP=30, FOREST_GAP=90, TOP=70;
const badgeMap={live:['b-live','ACTIVE'],sold:['b-sold','SOLD'],form:['b-form','IN FORMATION'],diss:['b-diss','DISSOLVED'],exit:['b-exit','LEGACY']};
let nodesFlat=[], edges=[];

function measure(n){ // subtree width
  if(!n.kids || !n.kids.length){ n._w = NW; return NW; }
  let w = 0;
  n.kids.forEach(([p,k],i)=>{ w += measure(k); if(i) w += HGAP; });
  n._w = Math.max(NW, w); return n._w;
}
function place(n, x, y){ // x = left edge of subtree
  n._x = x + n._w/2 - NW/2; n._y = y;
  nodesFlat.push(n);
  if(n.kids && n.kids.length){
    let cx = x + (n._w - n.kids.reduce((a,[p,k],i)=>a+k._w+(i?HGAP:0),0))/2;
    n.kids.forEach(([p,k])=>{
      place(k, cx, y + nodeH(n) + VGAP);
      edges.push({x1:n._x+NW/2, y1:n._y+nodeH(n), x2:k._x+NW/2, y2:k._y, label:p});
      cx += k._w + HGAP;
    });
  }
}
function nodeH(n){ // estimate height
  let h = 30 + Math.ceil((n.role||'').length/34)*12;
  if(n.banks && n.banks.length) h += 13;
  if(n.flag) h += Math.ceil(n.flag.length/36)*11;
  return Math.max(52, h);
}
function renderCombined(){
  nodesFlat=[]; edges=[];
  const chart = document.getElementById('chart');
  chart.querySelectorAll('.nd,.pct,.chart-title,.chart-sub').forEach(e=>e.remove());
  const t=document.createElement('div'); t.className='chart-title'; t.style.left='20px'; t.style.top='14px'; t.textContent=COMBINED.title; chart.appendChild(t);
  const sb=document.createElement('div'); sb.className='chart-sub'; sb.style.left='20px'; sb.style.top='34px'; sb.style.maxWidth='900px'; sb.textContent=COMBINED.sub; chart.appendChild(sb);
  const byId={};
  COMBINED.nodes.forEach(n=>{
    byId[n.id]=n; n._x=n.x; n._y=n.y+70;
    const d=document.createElement('div');
    d.className='nd '+(n.cls||''); d.style.left=n._x+'px'; d.style.top=n._y+'px';
    const badge=n.badge?`<span class="badge ${badgeMap[n.badge][0]}">${badgeMap[n.badge][1]}</span>`:'';
    const banks=n.banks&&n.banks.length?`<div class="bk">🏦 ${n.banks.join(' · ')}</div>`:'';
    const flag=n.flag?`<div class="fl">⚑ ${n.flag}</div>`:'';
    d.innerHTML=`<div class="nm">${n.nm}${badge}</div><div class="meta">${n.j}${n.role?' · '+n.role:''}</div>${banks}${flag}`;
    d.addEventListener('click',e=>{e.stopPropagation(); openPanel(n, COMBINED.title);});
    d.dataset.hay=(n.nm+' '+n.j+' '+(n.role||'')+' '+(n.banks||[]).join(' ')).toLowerCase();
    chart.appendChild(d); n._el=d;
  });
  requestAnimationFrame(()=>{
    const svg=document.getElementById('wires');
    let maxX=0,maxY=0;
    COMBINED.nodes.forEach(n=>{n._h=n._el.offsetHeight; maxX=Math.max(maxX,n._x+NW); maxY=Math.max(maxY,n._y+n._h);});
    svg.setAttribute('width',maxX+120); svg.setAttribute('height',maxY+120);
    chart.style.width=(maxX+120)+'px'; chart.style.height=(maxY+120)+'px';
    chart.querySelectorAll('.pct').forEach(e=>e.remove());
    let paths='';
    COMBINED.edges.forEach(e=>{
      const a=byId[e.f], b=byId[e.t]; if(!a||!b) return;
      const ax=a._x+NW/2, bx=b._x+NW/2;
      let x1,y1,x2,y2;
      if(a._y+a._h <= b._y){ x1=ax; y1=a._y+a._h; x2=bx; y2=b._y; }        // downward
      else if(b._y+b._h <= a._y){ x1=ax; y1=a._y; x2=bx; y2=b._y+b._h; }   // upward
      else { // side-to-side
        if(ax<bx){ x1=a._x+NW; y1=a._y+a._h/2; x2=b._x; y2=b._y+b._h/2; }
        else { x1=a._x; y1=a._y+a._h/2; x2=b._x+NW; y2=b._y+b._h/2; }
      }
      const mx=(x1+x2)/2, my=(y1+y2)/2;
      const style = e.kind==='x' ? 'stroke="#E8A33D" stroke-width="2.4" stroke-dasharray="7 5"'
                  : e.kind==='ubo' ? 'stroke="#1F3768" stroke-width="1.4"'
                  : 'stroke="#6D94AD" stroke-width="1.5"';
      paths+=`<path d="M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}" fill="none" ${style}/>`;
      if(e.label){
        const l=document.createElement('div'); l.className='pct';
        if(e.kind==='x'){ l.style.color='#A66A0F'; l.style.border='1px solid #E8A33D'; }
        l.style.left=mx+'px'; l.style.top=my+'px'; l.textContent=e.label;
        chart.appendChild(l);
      }
    });
    svg.innerHTML=paths;
  });
}
function renderStruct(si){
  if(si===-1){ renderCombined(); return; }
  const st = STRUCTS[si];
  nodesFlat=[]; edges=[];
  const chart = document.getElementById('chart');
  chart.querySelectorAll('.nd,.pct,.chart-title,.chart-sub').forEach(e=>e.remove());
  let fx = 20, maxBottom = 0;
  st.forest.forEach(f=>{
    // shareholders row
    const shs = f.sh || [];
    measure(f.root);
    const shWidth = shs.length ? shs.length*NW + (shs.length-1)*SHGAP : 0;
    const treeW = Math.max(f.root._w, shWidth);
    let shY = TOP + 40;
    let rootY = shY + (shs.length ? 52 + VGAP : 0);
    // place shareholders
    let sx = fx + (treeW - shWidth)/2;
    shs.forEach(([p,person])=>{
      person._x = sx; person._y = shY; person._w = NW;
      nodesFlat.push(person);
      sx += NW + SHGAP;
    });
    // place tree
    place(f.root, fx + (treeW - f.root._w)/2, rootY);
    // shareholder edges
    shs.forEach(([p,person])=>{
      edges.push({x1:person._x+NW/2, y1:person._y+46, x2:f.root._x+NW/2, y2:f.root._y, label:p});
    });
    // track extents
    nodesFlat.forEach(n=>{ maxBottom = Math.max(maxBottom, (n._y||0)+nodeH(n)); });
    fx += treeW + FOREST_GAP;
  });
  // title
  const t = document.createElement('div'); t.className='chart-title'; t.style.left='20px'; t.style.top='14px'; t.textContent = st.title; chart.appendChild(t);
  const sb = document.createElement('div'); sb.className='chart-sub'; sb.style.left='20px'; sb.style.top='34px'; sb.textContent = st.sub; chart.appendChild(sb);
  // nodes
  nodesFlat.forEach((n,i)=>{
    const d = document.createElement('div');
    d.className = 'nd ' + (n.cls||'');
    d.style.left = n._x+'px'; d.style.top = n._y+'px';
    const badge = n.badge?`<span class="badge ${badgeMap[n.badge][0]}">${badgeMap[n.badge][1]}</span>`:'';
    const banks = n.banks&&n.banks.length?`<div class="bk">🏦 ${n.banks.map(b=>b.split(' — ')[0]).join(' · ')}</div>`:'';
    const flag = n.flag?`<div class="fl">⚑ ${n.flag}</div>`:'';
    d.innerHTML = `<div class="nm">${n.nm}${badge}</div><div class="meta">${n.j}${n.role?' · '+n.role:''}</div>${banks}${flag}`;
    d.addEventListener('click', e=>{e.stopPropagation(); openPanel(n, st.title);});
    d.dataset.hay = (n.nm+' '+n.j+' '+(n.role||'')+' '+(n.banks||[]).join(' ')).toLowerCase();
    chart.appendChild(d);
    n._el = d;
  });
  // measure real heights, redraw edges from actual boxes
  requestAnimationFrame(()=>{
    const svg = document.getElementById('wires');
    let maxX=0, maxY=0;
    nodesFlat.forEach(n=>{ n._h = n._el.offsetHeight; maxX=Math.max(maxX,n._x+NW); maxY=Math.max(maxY,n._y+n._h); });
    svg.setAttribute('width', maxX+80); svg.setAttribute('height', maxY+80);
    document.getElementById('chart').style.width=(maxX+80)+'px';
    document.getElementById('chart').style.height=(maxY+80)+'px';
    let paths='';
    chart.querySelectorAll('.pct').forEach(e=>e.remove());
    edges.forEach(e=>{
      const srcN = nodesFlat.find(n=>Math.abs(n._x+NW/2-e.x1)<1 && Math.abs(n._y-e.y1)<200 && n._y<e.y2);
      const y1 = srcN? srcN._y + srcN._h : e.y1;
      const midY = (y1 + e.y2)/2;
      paths += `<path d="M ${e.x1} ${y1} L ${e.x1} ${midY} L ${e.x2} ${midY} L ${e.x2} ${e.y2}" fill="none" stroke="#6D94AD" stroke-width="1.5"/>`;
      if(e.label){
        const l = document.createElement('div'); l.className='pct';
        l.style.left = e.x2+'px'; l.style.top = (e.y2-12)+'px'; l.textContent = e.label;
        chart.appendChild(l);
      }
    });
    svg.innerHTML = paths + '<defs></defs>';
  });
}
// ---------- panel ----------
function openPanel(n, structTitle){
  const banks = n.banks&&n.banks.length? n.banks.map(b=>`<dd>• ${b}</dd>`).join(''):'<dd>None recorded</dd>';
  document.getElementById('panelBody').innerHTML = `
   <h3>${n.nm}</h3><div style="font-size:11px;color:var(--grey2)">${structTitle}</div>
   <dl><dt>Jurisdiction / registration</dt><dd>${n.j}</dd>
   <dt>Role</dt><dd>${n.role||'—'}</dd>
   <dt>Banking / lenders</dt>${banks}
   <dt>Source</dt><dd style="font-size:11px;color:var(--grey2)">Group Structure — Detailed Entity Charts, 6 Jul 2026</dd></dl>
   ${n.flag?`<div class="flagbox">⚑ ${n.flag}</div>`:''}`;
  document.getElementById('panel').classList.add('open');
}
function closePanel(){document.getElementById('panel').classList.remove('open');}
// ---------- tabs ----------
let current=-1;
const tabsEl=document.getElementById('tabs');
const cb=document.createElement('button'); cb.className='tab active'; cb.textContent='⊕ All — Combined';
cb.addEventListener('click',()=>{current=-1; document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===0)); renderStruct(-1); resetView();});
tabsEl.appendChild(cb);
STRUCTS.forEach((s,i)=>{
  const b=document.createElement('button'); b.className='tab'; b.textContent=s.tab;
  b.addEventListener('click',()=>{current=i; document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i+1)); renderStruct(i); resetView();});
  tabsEl.appendChild(b);
});
// ---------- pan & zoom ----------
let scale=.9, ox=10, oy=0, drag=null;
const vp=document.getElementById('viewport'), cv=document.getElementById('canvas');
function apply(){cv.style.transform=`translate(${ox}px,${oy}px) scale(${scale})`;}
function resetView(){scale=.9; ox=10; oy=0; apply();}
vp.addEventListener('mousedown',e=>{drag={x:e.clientX-ox,y:e.clientY-oy}; vp.classList.add('dragging');});
window.addEventListener('mousemove',e=>{if(drag){ox=e.clientX-drag.x; oy=e.clientY-drag.y; apply();}});
window.addEventListener('mouseup',()=>{drag=null; vp.classList.remove('dragging');});
vp.addEventListener('wheel',e=>{e.preventDefault();
  const f=e.deltaY<0?1.1:0.9, r=vp.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  ox=mx-(mx-ox)*f; oy=my-(my-oy)*f; scale=Math.min(2.5,Math.max(.3,scale*f)); apply();},{passive:false});
// ---------- search ----------
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();
  // search highlights on the CURRENT sheet (combined sheet holds everything)
  setTimeout(()=>{
    document.querySelectorAll('.nd').forEach(el=>{ el.classList.toggle('hl', q.length>1 && el.dataset.hay.includes(q)); });
  }, 50);
});
renderStruct(-1); apply();
</script>
